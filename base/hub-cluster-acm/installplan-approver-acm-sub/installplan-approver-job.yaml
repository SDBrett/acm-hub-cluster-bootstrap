apiVersion: batch/v1
kind: Job
metadata:
  name: installplan-approver
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  template:
    spec:
      containers:
        - image: registry.redhat.io/openshift4/ose-cli-rhel9:v4.20
          command:
            - /bin/bash
            - -c
            - |
              export HOME=/tmp/approver

              echo "Checking if subscription '$SUBSCRIPTION_NAME' exists"

              for i in $(seq 1 $RETRIES); do
                echo "Attempt $i of $RETRIES"

                if oc get subscriptions.operators.coreos.com "$SUBSCRIPTION_NAME" >/dev/null 2>&1; then
                  echo "Subscription found"
                  break
                fi
                if [ "$i" -eq "$RETRIES" ]; then
                  echo "Subscription not found after $RETRIES attempts, exiting"
                  exit 1
                fi
                echo "Subscription not found, will try again in $SLEEP seconds"
                sleep "$SLEEP"
              done

              echo "Waiting for installplan reference on subscription '$SUBSCRIPTION_NAME'"
              installplan=""
              for i in $(seq 1 $RETRIES); do
                echo "InstallPlan ref attempt $i of $RETRIES"
                installplan=$(oc get subscriptions.operators.coreos.com "$SUBSCRIPTION_NAME" -o jsonpath='{.status.installPlanRef.name}')
                if [ -n "$installplan" ]; then
                  echo "Found installplan $installplan"
                  break
                fi
                if [ "$i" -eq "$RETRIES" ]; then
                  echo "InstallPlan reference not set after $RETRIES attempts, exiting"
                  exit 1
                fi
                echo "InstallPlan not ready yet, waiting $SLEEP seconds"
                sleep "$SLEEP"
              done

              approved=$(oc get installplan "$installplan" -o jsonpath="{.spec.approved}")
              if [ "$approved" = "false" ]; then
                echo "Approving install plan $installplan"
                oc patch installplan "$installplan" --type=json -p='[{"op":"replace","path": "/spec/approved", "value": true}]'
              elif [ "$approved" = "true" ]; then
                echo "Install Plan '$installplan' already approved"
              else
                echo "Unexpected approved state '$approved' for installplan $installplan, exiting"
                exit 1
              fi

          imagePullPolicy: Always
          name: installplan-approver
          env:
            - name: SUBSCRIPTION_NAME
              value: "advanced-cluster-management"
            - name: SLEEP
              value: "30"
            - name: RETRIES
              value: "20"
      dnsPolicy: ClusterFirst
      restartPolicy: OnFailure
      serviceAccount: installplan-approver-job
      serviceAccountName: installplan-approver-job
      terminationGracePeriodSeconds: 30